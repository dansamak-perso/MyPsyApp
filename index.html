// ================= Storage: local + Google Drive =================
function useClinicData() {
  const [data, setDataState] = useState(() => {
    try {
      const raw = localStorage.getItem(LOCAL_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { patients: [], appointments: [], payments: [] };
  });

  const [driveStatus, setDriveStatus] = useState("disconnected"); // disconnected|connecting|syncing|synced|error
  const [driveError, setDriveError] = useState(null);
  const [lastSync, setLastSync] = useState(localStorage.getItem("gdrive_last_sync") || null);
  const [clientId, setClientIdState] = useState(localStorage.getItem("gdrive_client_id") || "");
  const [conflict, setConflict] = useState(null); // remote data pending user decision

  const connectedRef = useRef(false);
  const tokenClientRef = useRef(null);
  const accessTokenRef = useRef(null);
  const tokenExpiryRef = useRef(0);
  const fileIdRef = useRef(localStorage.getItem("gdrive_file_id") || null);
  const pushTimerRef = useRef(null);
  const dataRef = useRef(data);
  dataRef.current = data;

  function saveLocal(next) {
    try { localStorage.setItem(LOCAL_KEY, JSON.stringify(next)); } catch (e) {}
  }

  function waitForGsi(cb) {
    if (window.google && window.google.accounts && window.google.accounts.oauth2) { cb(); return; }
    let tries = 0;
    const iv = setInterval(() => {
      tries++;
      if (window.google && window.google.accounts && window.google.accounts.oauth2) { clearInterval(iv); cb(); }
      else if (tries > 60) { clearInterval(iv); setDriveStatus("error"); setDriveError("לא ניתן לטעון את שירותי Google (בדקו חיבור לאינטרנט)"); }
    }, 250);
  }

  function ensureToken(interactive, cb) {
    if (accessTokenRef.current && Date.now() < tokenExpiryRef.current) { cb(accessTokenRef.current, null); return; }
    if (!tokenClientRef.current) { cb(null, "no-client"); return; }
    tokenClientRef.current.callback = (resp) => {
      if (resp.error) { cb(null, resp.error); return; }
      accessTokenRef.current = resp.access_token;
      tokenExpiryRef.current = Date.now() + resp.expires_in * 1000 - 60000;
      cb(resp.access_token, null);
    };
    try {
      tokenClientRef.current.requestAccessToken({ prompt: interactive ? "consent" : "" });
    } catch (e) { cb(null, "request-failed"); }
  }

  async function findOrCreateFile(token) {
    if (fileIdRef.current) return fileIdRef.current;
    const q = encodeURIComponent(`name='${DRIVE_FILE_NAME}' and trashed=false`);
    const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&spaces=drive&fields=files(id,name)`, {
      headers: { Authorization: `Bearer ${token}` },
    });
    const json = await res.json();
    if (json.files && json.files.length) {
      fileIdRef.current = json.files[0].id;
    } else {
      const createRes = await fetch("https://www.googleapis.com/drive/v3/files", {
        method: "POST",
        headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
        body: JSON.stringify({ name: DRIVE_FILE_NAME }),
      });
      const created = await createRes.json();
      fileIdRef.current = created.id;
    }
    localStorage.setItem("gdrive_file_id", fileIdRef.current);
    return fileIdRef.current;
  }

  async function downloadFromDrive(token, fileId) {
    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
      headers: { Authorization: `Bearer ${token}` },
    });
    if (!res.ok) return null;
    const text = await res.text();
    if (!text) return null;
    try { return JSON.parse(text); } catch (e) { return null; }
  }

  async function uploadToDrive(token, fileId, payload) {
    const res = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
      method: "PATCH",
      headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error("upload failed");
  }

  function markSynced() {
    const now = new Date().toISOString();
    localStorage.setItem("gdrive_last_sync", now);
    setLastSync(now);
    setDriveStatus("synced");
    setDriveError(null);
  }

  function schedulePush(next) {
    if (!connectedRef.current) return;
    if (pushTimerRef.current) clearTimeout(pushTimerRef.current);
    setDriveStatus("syncing");
    pushTimerRef.current = setTimeout(() => {
      ensureToken(false, async (token) => {
        if (!token) { setDriveStatus("error"); setDriveError("החיבור פג — יש להתחבר מחדש בהגדרות"); return; }
        try {
          const fileId = await findOrCreateFile(token);
          await uploadToDrive(token, fileId, next);
          markSynced();
        } catch (e) {
          setDriveStatus("error"); setDriveError("הסנכרון נכשל, ננסה שוב בפעם הבאה");
        }
      });
    }, 1500);
  }

  const persist = useCallback((next) => {
    setDataState(next);
    saveLocal(next);
    schedulePush(next);
  }, []);

  function connectDrive(newClientId, onDone) {
    setClientIdState(newClientId);
    localStorage.setItem("gdrive_client_id", newClientId);
    setDriveStatus("connecting");
    setDriveError(null);
    waitForGsi(() => {
      tokenClientRef.current = window.google.accounts.oauth2.initTokenClient({
        client_id: newClientId,
        scope: DRIVE_SCOPE,
        callback: () => {},
      });
      ensureToken(true, async (token, err) => {
        if (!token) {
          setDriveStatus("error");
          setDriveError("ההתחברות בוטלה או נכשלה. ודאו שה-Client ID תקין ושכתובת האתר רשומה ב-Google Cloud Console.");
          onDone && onDone(false);
          return;
        }
        connectedRef.current = true;
        try {
          const fileId = await findOrCreateFile(token);
          const remote = await downloadFromDrive(token, fileId);
          const remoteHasData = remote && ((remote.patients||[]).length || (remote.appointments||[]).length || (remote.payments||[]).length);
          const localHasData = dataRef.current.patients.length || dataRef.current.appointments.length || dataRef.current.payments.length;
          if (remoteHasData && !localHasData) {
            setConflict(remote);
          } else {
            await uploadToDrive(token, fileId, dataRef.current);
            markSynced();
          }
          onDone && onDone(true);
        } catch (e) {
          setDriveStatus("error"); setDriveError("שגיאה בגישה ל-Drive");
          onDone && onDone(false);
        }
      });
    });
  }

  function resolveConflict(useRemote) {
    if (useRemote && conflict) {
      setDataState(conflict);
      saveLocal(conflict);
    }
    setConflict(null);
  }

  function disconnectDrive() {
    connectedRef.current = false;
    accessTokenRef.current = null;
    setDriveStatus("disconnected");
  }

  function forgetDrive() {
    disconnectDrive();
    localStorage.removeItem("gdrive_client_id");
    localStorage.removeItem("gdrive_file_id");
    localStorage.removeItem("gdrive_last_sync");
    fileIdRef.current = null;
    setClientIdState("");
    setLastSync(null);
  }

  function manualSync(onDone) {
    if (!connectedRef.current) { onDone && onDone(false, "לא מחובר"); return; }
    setDriveStatus("syncing");
    ensureToken(false, async (token) => {
      if (!token) { setDriveStatus("error"); setDriveError("החיבור פג — יש להתחבר מחדש"); onDone && onDone(false); return; }
      try {
        const fileId = await findOrCreateFile(token);
        await uploadToDrive(token, fileId, dataRef.current);
        markSynced();
        onDone && onDone(true);
      } catch (e) { setDriveStatus("error"); setDriveError("הסנכרון נכשל"); onDone && onDone(false); }
    });
  }

  function restoreFromDrive(onDone) {
    if (!connectedRef.current) { onDone && onDone(false, "לא מחובר"); return; }
    ensureToken(false, async (token) => {
      if (!token) { onDone && onDone(false, "החיבור פג"); return; }
      try {
        const fileId = await findOrCreateFile(token);
        const remote = await downloadFromDrive(token, fileId);
        if (remote) setConflict(remote);
        onDone && onDone(true);
      } catch (e) { onDone && onDone(false, "שגיאה בטעינה"); }
    });
  }

  // best-effort silent reconnect on load
  useEffect(() => {
    if (clientId) {
      waitForGsi(() => {
        tokenClientRef.current = window.google.accounts.oauth2.initTokenClient({
          client_id: clientId, scope: DRIVE_SCOPE, callback: () => {},
        });
        ensureToken(false, (token) => {
          if (token) { connectedRef.current = true; setDriveStatus("synced"); }
          else { setDriveStatus("disconnected"); }
        });
      });
    }
    // eslint-disable-next-line
  }, []);

  function exportBackupFile() {
    const blob = new Blob([JSON.stringify(dataRef.current, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `clinic-backup-${todayISO()}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }

  function importBackupFile(file, onDone) {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        setDataState(parsed); saveLocal(parsed);
        onDone && onDone(true);
      } catch (e) { onDone && onDone(false); }
    };
    reader.readAsText(file);
  }

  return {
    data, persist, driveStatus, driveError, lastSync, clientId, conflict,
    connectDrive, disconnectDrive, forgetDrive, manualSync, restoreFromDrive, resolveConflict,
    exportBackupFile, importBackupFile,
  };
}

      </div>

}
function Field({ label, children }) {

function StatusBadge({ status }) {

function App() {
  const {
    data, persist, driveStatus, driveError, lastSync, clientId, conflict,
    connectDrive, disconnectDrive, forgetDrive, manualSync, restoreFromDrive, resolveConflict,
    exportBackupFile, importBackupFile,
  } = useClinicData();
  const { patients, appointments, payments } = data;
  const [view, setView] = useState("dashboard");
  const [search, setSearch] = useState("");
  const [weekOffset, setWeekOffset] = useState(0);
  const [selectedPatientId, setSelectedPatientId] = useState(null);

  const [patientModal, setPatientModal] = useState(null);
  const [apptModal, setApptModal] = useState(null);
  const [paymentModal, setPaymentModal] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);

  const patientMap = useMemo(() => Object.fromEntries(patients.map(p => [p.id, p])), [patients]);

  function patientRate(patientId) { const p = patientMap[patientId]; return p ? Number(p.sessionRate || 0) : 0; }
  function patientBalance(patientId) {
    const owed = appointments.filter(a => a.patientId === patientId && a.status === "completed")
      .reduce((sum, a) => sum + Number(a.price ?? patientRate(patientId)), 0);
    const paid = payments.filter(p => p.patientId === patientId).reduce((sum, p) => sum + Number(p.amount), 0);
    return owed - paid;
  }

  function savePatient(form) {
    const exists = patients.some(p => p.id === form.id);
    const next = exists ? patients.map(p => p.id === form.id ? form : p) : [...patients, { ...form, id: uid() }];
    persist({ ...data, patients: next });
    setPatientModal(null);
  }
  function deletePatient(id) {
    persist({ patients: patients.filter(p => p.id !== id), appointments: appointments.filter(a => a.patientId !== id), payments: payments.filter(p => p.patientId !== id) });
    if (selectedPatientId === id) setSelectedPatientId(null);
    setConfirmDelete(null);
  }
  function saveAppt(form) {
    const exists = appointments.some(a => a.id === form.id);
    const next = exists ? appointments.map(a => a.id === form.id ? form : a) : [...appointments, { ...form, id: uid() }];
    persist({ ...data, appointments: next });
    setApptModal(null);
  }
  function deleteAppt(id) { persist({ ...data, appointments: appointments.filter(a => a.id !== id) }); setConfirmDelete(null); }
  function savePayment(form) {
    const exists = payments.some(p => p.id === form.id);
    const next = exists ? payments.map(p => p.id === form.id ? form : p) : [...payments, { ...form, id: uid() }];
    persist({ ...data, payments: next });
    setPaymentModal(null);
  }
  function deletePayment(id) { persist({ ...data, payments: payments.filter(p => p.id !== id) }); setConfirmDelete(null); }

  const NAV = [
    { id: "dashboard", label: "לוח בקרה", icon: I.dashboard },
    { id: "patients", label: "מטופלים", icon: I.patients },
    { id: "calendar", label: "יומן", icon: I.calendar },
    { id: "finance", label: "כספים", icon: I.finance },
    { id: "settings", label: "הגדרות וגיבוי", icon: I.settings },
  ];

  const statusChip = {
    disconnected: { icon: "☁️", text: "לא מחובר לגיבוי ענן", color: "#9BB0A5" },
    connecting: { icon: "🔄", text: "מתחבר…", color: "#E8C97A" },
    syncing: { icon: "🔄", text: "מסנכרן…", color: "#E8C97A" },
    synced: { icon: "✅", text: lastSync ? `מסונכרן · ${formatDateTime(lastSync)}` : "מסונכרן", color: "#8FD0A0" },
    error: { icon: "⚠️", text: "שגיאת סנכרון", color: "#E8A8AE" },
  }[driveStatus];

  return (
    <div className="clinic-app" dir="rtl" lang="he">
      <style>{styleSheet}</style>

      <aside className="sidebar-desktop" style={{ width: 220, background: "var(--color-primary)", padding: "22px 14px", display: "flex", flexDirection: "column", flexShrink: 0 }}>
        <div style={{ padding: "0 8px 22px", borderBottom: "1px solid rgba(255,255,255,0.12)", marginBottom: 18 }}>
          <div className="font-display" style={{ color: "#fff", fontSize: 21, fontWeight: 700 }}>מרפאה פרטית</div>
          <div style={{ color: "#9BB0A5", fontSize: 12.5, marginTop: 2 }}>ניהול מטופלים ותיאום</div>
        </div>
        <nav style={{ display: "flex", flexDirection: "column", gap: 4 }}>
          {NAV.map(n => (
            <button key={n.id} className={`nav-btn ${view === n.id ? "active" : ""}`} onClick={() => setView(n.id)}>
              <n.icon />{n.label}
            </button>
          ))}
        </nav>
        <div style={{ marginTop: "auto", padding: "12px 8px 0" }}>
          <button onClick={() => setView("settings")} style={{ background: "rgba(255,255,255,0.06)", border: "none", borderRadius: 9, padding: "8px 10px", width: "100%", textAlign: "right", cursor: "pointer", display: "flex", alignItems: "center", gap: 8, fontSize: 11.5, color: statusChip.color }}>
            <span>{statusChip.icon}</span><span>{statusChip.text}</span>
          </button>
        </div>
      </aside>

      <div className="bottom-nav" style={{ position: "fixed", bottom: 0, insetInlineStart: 0, insetInlineEnd: 0, background: "var(--color-primary)", zIndex: 40, padding: "6px 4px", paddingBottom: "calc(6px + env(safe-area-inset-bottom))" }}>
        {NAV.map(n => (
          <button key={n.id} onClick={() => setView(n.id)} style={{ flex: 1, background: "transparent", border: "none", color: view === n.id ? "#fff" : "#9BB0A5", display: "flex", flexDirection: "column", alignItems: "center", gap: 2, padding: "6px 0", fontSize: 10 }}>
            <n.icon /><span>{n.label}</span>
          </button>
        ))}
      </div>

      <main className="clinic-scroll" style={{ flex: 1, overflowY: "auto", padding: "28px 32px 90px", minWidth: 0 }}>
        {view === "dashboard" ? (
          <Dashboard patients={patients} appointments={appointments} payments={payments} patientMap={patientMap}
            onAddAppt={() => setApptModal({})} onAddPatient={() => setPatientModal({})} onGoCalendar={() => setView("calendar")} />
        ) : view === "patients" ? (
          <PatientsView patients={patients} appointments={appointments} payments={payments} search={search} setSearch={setSearch}
            patientBalance={patientBalance} selectedPatientId={selectedPatientId} setSelectedPatientId={setSelectedPatientId}
            onAdd={() => setPatientModal({})} onEdit={(p) => setPatientModal(p)}
            onDelete={(p) => setConfirmDelete({ type: "patient", id: p.id, label: `את/ה בטוח/ה שברצונך למחוק את ${p.name}? כל הפגישות והתשלומים שלו/ה יימחקו גם כן.` })}
            onAddAppt={(patientId) => setApptModal({ patientId, date: todayISO(), startTime: "10:00", duration: 50, status: "scheduled" })}
            onAddPayment={(patientId) => setPaymentModal({ patientId, date: todayISO(), amount: "", method: "cash" })} />
        ) : view === "calendar" ? (
          <CalendarView appointments={appointments} patientMap={patientMap} weekOffset={weekOffset} setWeekOffset={setWeekOffset}
            onAdd={(date, startTime) => setApptModal({ date, startTime: startTime || "10:00", duration: 50, status: "scheduled" })}
            onEdit={(a) => setApptModal(a)} />
        ) : view === "finance" ? (
          <FinanceView patients={patients} appointments={appointments} payments={payments} patientMap={patientMap} patientBalance={patientBalance}
            onAddPayment={() => setPaymentModal({ date: todayISO(), amount: "", method: "cash" })}
            onEditPayment={(p) => setPaymentModal(p)}
            onDeletePayment={(p) => setConfirmDelete({ type: "payment", id: p.id, label: "למחוק את התשלום הזה?" })} />
        ) : (
          <SettingsView
            driveStatus={driveStatus} driveError={driveError} lastSync={lastSync} clientId={clientId}
            connectDrive={connectDrive} disconnectDrive={disconnectDrive} forgetDrive={forgetDrive}
            manualSync={manualSync} restoreFromDrive={restoreFromDrive}
            exportBackupFile={exportBackupFile} importBackupFile={importBackupFile}
          />
        )}
      </main>

      {patientModal !== null && <PatientModal initial={patientModal} onClose={() => setPatientModal(null)} onSave={savePatient} />}
      {apptModal !== null && (
        <ApptModal initial={apptModal} patients={patients} onClose={() => setApptModal(null)} onSave={saveAppt}
          onDelete={apptModal.id ? () => setConfirmDelete({ type: "appt", id: apptModal.id, label: "למחוק את הפגישה הזו?" }) : null} />
      )}
      {paymentModal !== null && <PaymentModal initial={paymentModal} patients={patients} onClose={() => setPaymentModal(null)} onSave={savePayment} />}
      {confirmDelete && (
        <Modal title="אישור מחיקה" onClose={() => setConfirmDelete(null)}>
          <p style={{ color: "var(--color-ink-soft)", marginBottom: 20, lineHeight: 1.6 }}>{confirmDelete.label}</p>
          <div style={{ display: "flex", gap: 10 }}>
            <button className="btn-primary" style={{ background: "var(--color-rose)" }} onClick={() => {
              if (confirmDelete.type === "patient") deletePatient(confirmDelete.id);
              else if (confirmDelete.type === "appt") deleteAppt(confirmDelete.id);
              else deletePayment(confirmDelete.id);
            }}>מחיקה</button>
            <button className="btn-secondary" onClick={() => setConfirmDelete(null)}>ביטול</button>
          </div>
        </Modal>
      )}
      {conflict && (
        <Modal title="נמצא גיבוי קודם ב-Drive" onClose={() => resolveConflict(false)}>
          <p style={{ color: "var(--color-ink-soft)", marginBottom: 18, lineHeight: 1.6 }}>
            נמצא קובץ גיבוי הכולל {(conflict.patients||[]).length} מטופלים, {(conflict.appointments||[]).length} פגישות ו-{(conflict.payments||[]).length} תשלומים.
            האם לשחזר את הנתונים האלה למכשיר הנוכחי?
          </p>
          <div style={{ display: "flex", gap: 10 }}>
            <button className="btn-primary" onClick={() => resolveConflict(true)}>שחזור מ-Drive</button>
            <button className="btn-secondary" onClick={() => resolveConflict(false)}>השארת הנתונים הנוכחיים</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

  const weekCounts = weekDates.map(d => appointments.filter(a => a.date === d && a.status !== "cancelled").length);
  const maxCount = Math.max(1, ...weekCounts);

  const pendingTotal = patients.reduce((sum, p) => {

    const paid = payments.filter(pay => pay.patientId === p.id).reduce((s, pay) => s + Number(pay.amount), 0);

  const cx = 110, cy = 110, minR = 34, maxR = 96;

        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <button className="btn-secondary" onClick={onAddPatient}><I.userPlus />מטופל/ת חדש/ה</button>
          <button className="btn-primary" onClick={onAddAppt}><I.calPlus />פגישה חדשה</button>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 16, marginBottom: 24 }}>
        <StatCard label="מטופלים פעילים" value={patients.length} color="var(--color-primary)" />
        <StatCard label="פגישות השבוע" value={weekSessions} color="var(--color-sage)" />
        <StatCard label="הכנסה החודש" value={formatILS(monthIncome)} color="var(--color-gold)" />
        <StatCard label="יתרה לגבייה" value={formatILS(pendingTotal)} color="var(--color-rose)" />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1.1fr 1.4fr", gap: 20 }} className="dash-grid">
        <div className="card" style={{ padding: 22, display: "flex", flexDirection: "column", alignItems: "center" }}>
          <h3 style={{ margin: "0 0 4px", fontSize: 16 }}>קצב השבוע</h3>
          <p style={{ color: "var(--color-ink-soft)", fontSize: 12.5, margin: "0 0 12px" }}>עומס הפגישות לפי יום</p>
          <svg viewBox="0 0 220 220" width="220" height="220">
            {weekDates.map((d, i) => {
              const val = weekCounts[i];
              const r = minR + (val / maxCount) * (maxR - minR);
              const startAngle = i * wedgeAngle;
              const endAngle = startAngle + wedgeAngle - 3;
              const p1 = polar(cx, cy, r, startAngle);
              const p2 = polar(cx, cy, r, endAngle);
              const isToday = d === today;
              const path = `M ${cx} ${cy} L ${p1.x} ${p1.y} A ${r} ${r} 0 0 1 ${p2.x} ${p2.y} Z`;
              const labelPos = polar(cx, cy, maxR + 16, startAngle + wedgeAngle / 2 - 1.5);
              return (
                <g key={d}>
                  <path d={path} fill={isToday ? "var(--color-gold)" : "var(--color-primary)"} opacity={isToday ? 0.95 : 0.55 + 0.35 * (val / maxCount)} />
                  <text x={labelPos.x} y={labelPos.y} fontSize="11" fill="var(--color-ink-soft)" textAnchor="middle" dominantBaseline="middle">{DAY_NAMES_SHORT[i]}</text>
                </g>
              );
            })}
            <circle cx={cx} cy={cy} r={minR - 6} fill="#fff" />
            <text x={cx} y={cy - 4} textAnchor="middle" fontSize="22" fontWeight="700" fill="var(--color-ink)">{weekSessions}</text>
            <text x={cx} y={cy + 14} textAnchor="middle" fontSize="11" fill="var(--color-ink-soft)">פגישות</text>
          </svg>
        </div>

        <div className="card" style={{ padding: 22 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <h3 style={{ margin: 0, fontSize: 16 }}>פגישות היום</h3>
            <button className="btn-ghost" onClick={onGoCalendar} style={{ fontSize: 13, color: "var(--color-primary)", fontWeight: 600 }}>ליומן המלא ‹</button>
          </div>
          {todaysAppts.length === 0 ? (
            <EmptyState icon={<I.calendar />} title="אין פגישות היום" subtitle="נצלו את הזמן הפנוי, או קבעו פגישה חדשה." action={<button className="btn-primary" onClick={onAddAppt}><I.plus />קביעת פגישה</button>} />
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {todaysAppts.map(a => (
                <div key={a.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 12px", background: "var(--color-bg)", borderRadius: 10 }}>
                  <div style={{ width: 54, fontWeight: 700, fontSize: 14, color: "var(--color-primary)" }}>{a.startTime}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 600, fontSize: 14.5 }}>{patientMap[a.patientId]?.name || "מטופל/ת לא ידוע/ה"}</div>
                    <div style={{ fontSize: 12.5, color: "var(--color-ink-soft)" }}>{a.duration} דק׳</div>
                  </div>
                  <StatusBadge status={a.status} />
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ---------- Calendar ----------
function CalendarView({ appointments, patientMap, weekOffset, setWeekOffset, onAdd, onEdit }) {
  const base = addDays(startOfWeek(new Date()), weekOffset * 7);
  const weekDates = Array.from({ length: 7 }, (_, i) => isoDate(addDays(base, i)));
  const hours = Array.from({ length: TIME_END - TIME_START }, (_, i) => TIME_START + i);
  const today = todayISO();

  function apptStyle(a) {
    const [h, m] = a.startTime.split(":").map(Number);
    const top = ((h + m / 60) - TIME_START) * PX_PER_HOUR;
    const height = Math.max(24, (a.duration / 60) * PX_PER_HOUR - 3);
    return { top, height };
  }
  const colors = { scheduled: "var(--color-primary)", completed: "var(--color-sage)", cancelled: "#B9B2A0", noshow: "var(--color-rose)" };

  return (
    <div className="fade-up">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18, flexWrap: "wrap", gap: 12 }}>
        <h1 className="font-display" style={{ fontSize: 26, margin: 0 }}>יומן</h1>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <button className="btn-secondary" onClick={() => setWeekOffset(w => w - 1)}>‹ שבוע קודם</button>
          <button className="btn-secondary" onClick={() => setWeekOffset(0)}>השבוע</button>
          <button className="btn-secondary" onClick={() => setWeekOffset(w => w + 1)}>שבוע הבא ›</button>
        </div>
      </div>

      <div className="card" style={{ overflowX: "auto", padding: 0 }}>
        <div style={{ display: "grid", gridTemplateColumns: "56px repeat(7, minmax(120px, 1fr))", minWidth: 900 }}>
          <div style={{ borderBottom: "1px solid var(--color-border)" }} />
          {weekDates.map((d, i) => (
            <div key={d} style={{ padding: "12px 8px", textAlign: "center", borderBottom: "1px solid var(--color-border)", borderInlineStart: "1px solid var(--color-border)", background: d === today ? "var(--color-primary-soft)" : "transparent" }}>
              <div style={{ fontSize: 12.5, color: "var(--color-ink-soft)", fontWeight: 600 }}>{DAY_NAMES[i]}</div>
              <div style={{ fontWeight: 700, fontSize: 15 }}>{new Date(d + "T00:00:00").getDate()}</div>
            </div>
          ))}
          <div style={{ position: "relative" }}>
            {hours.map(h => <div key={h} style={{ height: PX_PER_HOUR, fontSize: 11.5, color: "var(--color-ink-soft)", textAlign: "center", borderTop: "1px solid var(--color-border)", paddingTop: 4 }}>{h}:00</div>)}
          </div>
          {weekDates.map(d => {
            const dayAppts = appointments.filter(a => a.date === d);
            return (
              <div key={d} style={{ position: "relative", borderInlineStart: "1px solid var(--color-border)", cursor: "crosshair" }}
                onClick={(e) => {
                  if (e.target !== e.currentTarget) return;
                  const rect = e.currentTarget.getBoundingClientRect();
                  const y = e.clientY - rect.top;
                  const hourFloat = TIME_START + y / PX_PER_HOUR;
                  const hh = Math.floor(hourFloat);
                  const mm = Math.round((hourFloat - hh) * 60 / 15) * 15;
                  const time = `${String(hh).padStart(2, "0")}:${String(mm % 60).padStart(2, "0")}`;
                  onAdd(d, time);
                }}>
                {hours.map(h => <div key={h} style={{ height: PX_PER_HOUR, borderTop: "1px solid var(--color-border)" }} />)}
                {dayAppts.map(a => {
                  const { top, height } = apptStyle(a);
                  return (
                    <div key={a.id} onClick={(e) => { e.stopPropagation(); onEdit(a); }}
                      style={{ position: "absolute", top, height, insetInlineStart: 4, insetInlineEnd: 4, background: colors[a.status], borderRadius: 7, padding: "4px 7px", color: "#fff", fontSize: 12, overflow: "hidden", cursor: "pointer", boxShadow: "0 1px 3px rgba(0,0,0,0.15)" }}>
                      <div style={{ fontWeight: 700 }}>{a.startTime}</div>
                      <div style={{ opacity: 0.95 }}>{patientMap[a.patientId]?.name || "—"}</div>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      </div>
      <p style={{ color: "var(--color-ink-soft)", fontSize: 12.5, marginTop: 10 }}>לחיצה על משבצת פנויה ביומן פותחת קביעת פגישה חדשה בזמן המדויק.</p>
    </div>
  );
}

// ---------- Finance ----------
function FinanceView({ patients, appointments, payments, patientMap, patientBalance, onAddPayment, onEditPayment, onDeletePayment }) {
  const today = todayISO();
  const thisMonth = today.slice(0, 7);
  const monthIncome = payments.filter(p => p.date.slice(0, 7) === thisMonth).reduce((s, p) => s + Number(p.amount), 0);
  const totalPending = patients.reduce((s, p) => s + Math.max(0, patientBalance(p.id)), 0);
  const completedCount = appointments.filter(a => a.status === "completed").length;
  const pendingByInstitution = patients.filter(p => p.payerType === "institution").reduce((s, p) => s + Math.max(0, patientBalance(p.id)), 0);
  const pendingByPrivate = totalPending - pendingByInstitution;

  const chartData = useMemo(() => {
    const arr = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(); d.setDate(1); d.setMonth(d.getMonth() - i);
      const key = d.toISOString().slice(0, 7);
      const total = payments.filter(p => p.date.slice(0, 7) === key).reduce((s, p) => s + Number(p.amount), 0);
      arr.push({ name: MONTH_NAMES[d.getMonth()].slice(0, 3), amount: total });
    }
    return arr;
  }, [payments]);

  const sortedPayments = [...payments].sort((a, b) => b.date.localeCompare(a.date));
  const debtors = patients.map(p => ({ p, balance: patientBalance(p.id) })).filter(x => x.balance > 0).sort((a, b) => b.balance - a.balance);

  return (
    <div className="fade-up">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
        <h1 className="font-display" style={{ fontSize: 26, margin: 0 }}>כספים ותשלומים</h1>
        <button className="btn-primary" onClick={onAddPayment}><I.money />רישום תשלום</button>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 16, marginBottom: 22 }}>
        <StatCard label="הכנסה החודש" value={formatILS(monthIncome)} color="var(--color-gold)" />
        <StatCard label="יתרה לגבייה" value={formatILS(totalPending)} color="var(--color-rose)" />
        <StatCard label="פגישות שהתקיימו (סה״כ)" value={completedCount} color="var(--color-primary)" />
      </div>

      {(pendingByPrivate > 0 || pendingByInstitution > 0) && (
        <div className="card" style={{ padding: "14px 18px", marginBottom: 22, display: "flex", gap: 24, flexWrap: "wrap" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span className="badge badge-private">פרטי</span><span style={{ fontWeight: 700 }}>{formatILS(pendingByPrivate)}</span>
            <span style={{ color: "var(--color-ink-soft)", fontSize: 12.5 }}>ממתין לגבייה</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span className="badge badge-institution"><I.building size={11} />מוסדות</span><span style={{ fontWeight: 700 }}>{formatILS(pendingByInstitution)}</span>
            <span style={{ color: "var(--color-ink-soft)", fontSize: 12.5 }}>ממתין לגבייה</span>
          </div>
        </div>
      )}

      <div style={{ display: "grid", gridTemplateColumns: "1.3fr 1fr", gap: 18 }} className="dash-grid">
        <div className="card" style={{ padding: 20 }}>
          <h3 style={{ margin: "0 0 14px", fontSize: 15.5 }}>הכנסות ב-6 החודשים האחרונים</h3>
          <MiniBarChart data={chartData} dataKey="amount" color="#A97727" />
        </div>
        <div className="card" style={{ padding: 20 }}>
          <h3 style={{ margin: "0 0 12px", fontSize: 15.5, display: "flex", alignItems: "center", gap: 6 }}><I.alert size={14} />חייבים</h3>
          {debtors.length === 0 ? <p style={{ color: "var(--color-ink-soft)", fontSize: 13.5 }}>אין יתרות פתוחות כרגע. 🌿</p> : (
            <div style={{ display: "flex", flexDirection: "column", gap: 8, maxHeight: 240, overflowY: "auto" }} className="clinic-scroll">
              {debtors.map(({ p, balance }) => (
                <div key={p.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 10px", background: "var(--color-rose-soft)", borderRadius: 8, fontSize: 13.5, gap: 8 }}>
                  <span style={{ display: "flex", alignItems: "center", gap: 8, minWidth: 0 }}>
                    <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.name}</span>
                    {p.payerType === "institution" && <span className="badge badge-institution" style={{ flexShrink: 0 }}><I.building size={10} />{p.institutionName || "מוסד"}</span>}
                  </span>
                  <span style={{ fontWeight: 700, color: "var(--color-rose)", flexShrink: 0 }}>{formatILS(balance)}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      <div className="card" style={{ padding: 20, marginTop: 18 }}>
        <h3 style={{ margin: "0 0 14px", fontSize: 15.5 }}>כל התשלומים</h3>
        {sortedPayments.length === 0 ? (
          <EmptyState icon={<I.finance />} title="עדיין אין תשלומים רשומים" subtitle="רישום תשלום מקשר אותו אוטומטית למטופל/ת." action={<button className="btn-primary" onClick={onAddPayment}><I.plus />רישום תשלום</button>} />
        ) : (
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13.5 }}>
              <thead>
                <tr style={{ color: "var(--color-ink-soft)", textAlign: "start", borderBottom: "1px solid var(--color-border)" }}>
                  <th style={{ padding: "8px 6px", fontWeight: 600 }}>תאריך</th>
                  <th style={{ padding: "8px 6px", fontWeight: 600 }}>מטופל/ת</th>
                  <th style={{ padding: "8px 6px", fontWeight: 600 }}>אמצעי</th>
                  <th style={{ padding: "8px 6px", fontWeight: 600 }}>סכום</th>
                  <th style={{ padding: "8px 6px" }}></th>
                </tr>
              </thead>
              <tbody>
                {sortedPayments.map(p => (
                  <tr key={p.id} style={{ borderBottom: "1px solid var(--color-border)" }}>
                    <td style={{ padding: "9px 6px" }}>{formatHeDateShort(p.date)}</td>
                    <td style={{ padding: "9px 6px" }}>{patientMap[p.patientId]?.name || "—"}</td>
                    <td style={{ padding: "9px 6px" }}>{METHODS[p.method] || p.method}</td>
                    <td style={{ padding: "9px 6px", fontWeight: 700 }}>{formatILS(p.amount)}</td>
                    <td style={{ padding: "9px 6px", display: "flex", gap: 4, justifyContent: "flex-end" }}>
                      <button className="btn-ghost" onClick={() => onEditPayment(p)}><I.edit size={13} /></button>
                      <button className="btn-ghost" onClick={() => onDeletePayment(p)}><I.trash size={13} /></button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

// ---------- Settings & Backup ----------
function SettingsView({ driveStatus, driveError, lastSync, clientId, connectDrive, disconnectDrive, forgetDrive, manualSync, restoreFromDrive, exportBackupFile, importBackupFile }) {
  const [inputClientId, setInputClientId] = useState(clientId || "");
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState(null);
  const fileInputRef = useRef(null);

  const connected = driveStatus === "synced" || driveStatus === "syncing";

  function handleConnect() {
    if (!inputClientId.trim()) return;
    setBusy(true); setMsg(null);
    connectDrive(inputClientId.trim(), (ok) => {
      setBusy(false);
      setMsg(ok ? { type: "ok", text: "החיבור בוצע בהצלחה!" } : { type: "err", text: "החיבור נכשל." });
    });
  }
  function handleSyncNow() {
    setBusy(true); setMsg(null);
    manualSync((ok) => { setBusy(false); setMsg(ok ? { type: "ok", text: "סונכרן בהצלחה." } : { type: "err", text: "הסנכרון נכשל." }); });
  }
  function handleRestore() {
    setBusy(true); setMsg(null);
    restoreFromDrive((ok, err) => { setBusy(false); if (!ok) setMsg({ type: "err", text: err || "השחזור נכשל." }); });
  }

  return (
    <div className="fade-up" style={{ maxWidth: 640 }}>
      <h1 className="font-display" style={{ fontSize: 26, margin: "0 0 20px" }}>הגדרות וגיבוי</h1>

      <div className="card" style={{ padding: 22, marginBottom: 18 }}>
        <h3 style={{ margin: "0 0 4px", fontSize: 16 }}>☁️ גיבוי אוטומטי ל-Google Drive</h3>
        <p style={{ color: "var(--color-ink-soft)", fontSize: 13.5, margin: "0 0 16px" }}>לאחר חיבור חד-פעמי, כל שינוי (מטופל/ת, פגישה, תשלום) נשמר אוטומטית בקובץ בדרייב שלכם.</p>

        {driveError && <div style={{ background: "var(--color-rose-soft)", color: "var(--color-rose)", padding: "10px 12px", borderRadius: 9, fontSize: 13, marginBottom: 14 }}>{driveError}</div>}
        {msg && <div style={{ background: msg.type === "ok" ? "#DCE9DE" : "var(--color-rose-soft)", color: msg.type === "ok" ? "#2F6B3E" : "var(--color-rose)", padding: "10px 12px", borderRadius: 9, fontSize: 13, marginBottom: 14 }}>{msg.text}</div>}

        {!connected ? (
          <>
            <Field label="Google Client ID">
              <input value={inputClientId} onChange={(e) => setInputClientId(e.target.value)} placeholder="xxxxxxxxxxxx.apps.googleusercontent.com" />
            </Field>
            <button className="btn-primary" disabled={!inputClientId.trim() || busy} onClick={handleConnect}>
              {busy ? "מתחבר…" : "התחברות ל-Google Drive"}
            </button>
          </>
        ) : (
          <div>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
              <span className="badge" style={{ background: "#DCE9DE", color: "#2F6B3E" }}>✅ מחובר</span>
              <span style={{ fontSize: 12.5, color: "var(--color-ink-soft)" }}>{lastSync ? `סונכרן לאחרונה: ${formatDateTime(lastSync)}` : ""}</span>
            </div>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
              <button className="btn-secondary" disabled={busy} onClick={handleSyncNow}>סנכרון עכשיו</button>
              <button className="btn-secondary" disabled={busy} onClick={handleRestore}>שחזור מ-Drive</button>
              <button className="btn-secondary" onClick={disconnectDrive}>ניתוק זמני</button>
              <button className="btn-secondary" style={{ color: "var(--color-rose)", borderColor: "var(--color-rose-soft)" }} onClick={forgetDrive}>שכחת חיבור לגמרי</button>
            </div>
          </div>
        )}
      </div>

      <div className="card" style={{ padding: 22, marginBottom: 18 }}>
        <h3 style={{ margin: "0 0 4px", fontSize: 16 }}>📁 גיבוי ידני לקובץ</h3>
        <p style={{ color: "var(--color-ink-soft)", fontSize: 13.5, margin: "0 0 16px" }}>רשת ביטחון נוספת — קובץ שתוכלו לשמור לבד (ל-Files, אימייל וכו׳).</p>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          <button className="btn-secondary" onClick={exportBackupFile}>ייצוא לקובץ</button>
          <button className="btn-secondary" onClick={() => fileInputRef.current?.click()}>ייבוא מקובץ</button>
          <input ref={fileInputRef} type="file" accept="application/json" style={{ display: "none" }}
            onChange={(e) => { const f = e.target.files[0]; if (f) importBackupFile(f, () => { setMsg({ type: "ok", text: "יובא בהצלחה." }); }); e.target.value = ""; }} />
        </div>
      </div>

      <div className="card" style={{ padding: 22 }}>
        <h3 style={{ margin: "0 0 10px", fontSize: 16 }}>🧭 הגדרת Google Drive – מדריך מקוצר</h3>
        <ol style={{ margin: 0, paddingInlineStart: 20, color: "var(--color-ink-soft)", fontSize: 13.5, lineHeight: 1.9 }}>
          <li>גשו ל-Google Cloud Console וצרו פרויקט חדש (חינמי).</li>
          <li>הפעילו את ה-API "Google Drive API" עבור הפרויקט.</li>
          <li>צרו פרטי גישה מסוג "OAuth client ID" מסוג "Web application".</li>
          <li>הוסיפו את כתובת האתר בה האפליקציה מתארחת תחת "Authorized JavaScript origins".</li>
          <li>העתיקו את ה-Client ID שנוצר והדביקו אותו כאן למעלה.</li>
        </ol>
      </div>
    </div>
  );
}

// ---------- Modals ----------
function PatientModal({ initial, onClose, onSave }) {
  const [form, setForm] = useState({
    id: initial.id || null, name: initial.name || "", phone: initial.phone || "", email: initial.email || "",
    sessionRate: initial.sessionRate ?? 300, payerType: initial.payerType || "private", institutionName: initial.institutionName || "",
    notes: initial.notes || "",
  });
  const set = (k) => (e) => setForm(f => ({ ...f, [k]: e.target.value }));
  return (
    <Modal title={initial.id ? "עריכת מטופל/ת" : "מטופל/ת חדש/ה"} onClose={onClose}>
      <Field label="שם מלא *"><input value={form.name} onChange={set("name")} placeholder="לדוגמה: דנה כהן" /></Field>
      <Field label="טלפון"><input value={form.phone} onChange={set("phone")} placeholder="050-0000000" /></Field>
      <Field label="אימייל"><input value={form.email} onChange={set("email")} placeholder="name@mail.com" /></Field>
      <Field label="מקור התשלום">
        <select value={form.payerType} onChange={set("payerType")}>
          <option value="private">פרטי (המטופל/ת משלמ/ת בעצמו/ה)</option>
          <option value="institution">מוסד / פנימייה משלמ/ת</option>
        </select>
      </Field>
      {form.payerType === "institution" && (
        <Field label="שם המוסד / הפנימייה"><input value={form.institutionName} onChange={set("institutionName")} placeholder="לדוגמה: פנימיית הרימון" /></Field>
      )}
      <Field label="תעריף פגישה (₪)"><input type="number" value={form.sessionRate} onChange={set("sessionRate")} /></Field>
      <Field label="הערות כלליות"><textarea rows={4} value={form.notes} onChange={set("notes")} placeholder="רקע, מטרות טיפול, נקודות למעקב…" /></Field>
      <div style={{ display: "flex", gap: 10, marginTop: 6 }}>
        <button className="btn-primary" disabled={!form.name.trim()} onClick={() => onSave({ ...form, sessionRate: Number(form.sessionRate) || 0 })}>שמירה</button>
        <button className="btn-secondary" onClick={onClose}>ביטול</button>
      </div>
    </Modal>
  );
}

function ApptModal({ initial, patients, onClose, onSave, onDelete }) {
  const [form, setForm] = useState({
    id: initial.id || null, patientId: initial.patientId || (patients[0]?.id ?? ""), date: initial.date || todayISO(),
    startTime: initial.startTime || "10:00", duration: initial.duration || 50, status: initial.status || "scheduled",
    price: initial.price ?? "", notes: initial.notes || "",
  });
  const set = (k) => (e) => setForm(f => ({ ...f, [k]: e.target.value }));
  return (
    <Modal title={initial.id ? "עריכת פגישה" : "פגישה חדשה"} onClose={onClose}>
      <Field label="מטופל/ת *">
        <select value={form.patientId} onChange={set("patientId")}>
          <option value="" disabled>בחירת מטופל/ת</option>
          {patients.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
      </Field>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        <Field label="תאריך"><input type="date" value={form.date} onChange={set("date")} /></Field>
        <Field label="שעה"><input type="time" value={form.startTime} onChange={set("startTime")} /></Field>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        <Field label="משך (דקות)"><input type="number" value={form.duration} onChange={set("duration")} /></Field>
        <Field label="סטטוס">
          <select value={form.status} onChange={set("status")}>
            <option value="scheduled">קבוע</option><option value="completed">התקיים</option>
            <option value="cancelled">בוטל</option><option value="noshow">לא הגיע/ה</option>
          </select>
        </Field>
      </div>
      <Field label="מחיר מותאם (₪, אופציונלי)"><input type="number" value={form.price} onChange={set("price")} placeholder="ברירת מחדל: תעריף המטופל/ת" /></Field>
      <Field label="הערות לפגישה"><textarea rows={3} value={form.notes} onChange={set("notes")} /></Field>
      <div style={{ display: "flex", gap: 10, marginTop: 6, flexWrap: "wrap" }}>
        <button className="btn-primary" disabled={!form.patientId} onClick={() => onSave({ ...form, duration: Number(form.duration) || 50, price: form.price === "" ? undefined : Number(form.price) })}>שמירה</button>
        <button className="btn-secondary" onClick={onClose}>ביטול</button>
        {onDelete && <button className="btn-secondary" style={{ color: "var(--color-rose)", borderColor: "var(--color-rose-soft)", marginInlineStart: "auto" }} onClick={onDelete}><I.trash size={14} />מחיקה</button>}
      </div>
    </Modal>
  );
}

function PaymentModal({ initial, patients, onClose, onSave }) {
  const [form, setForm] = useState({
    id: initial.id || null, patientId: initial.patientId || (patients[0]?.id ?? ""), date: initial.date || todayISO(),
    amount: initial.amount ?? "", method: initial.method || "cash", note: initial.note || "",
  });
  const set = (k) => (e) => setForm(f => ({ ...f, [k]: e.target.value }));
  return (
    <Modal title={initial.id ? "עריכת תשלום" : "רישום תשלום"} onClose={onClose}>
      <Field label="מטופל/ת *">
        <select value={form.patientId} onChange={set("patientId")}>
          <option value="" disabled>בחירת מטופל/ת</option>
          {patients.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
      </Field>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        <Field label="תאריך"><input type="date" value={form.date} onChange={set("date")} /></Field>
        <Field label="סכום (₪)"><input type="number" value={form.amount} onChange={set("amount")} /></Field>
      </div>
      <Field label="אמצעי תשלום">
        <select value={form.method} onChange={set("method")}>
          <option value="cash">מזומן</option><option value="card">אשראי</option>
          <option value="transfer">העברה בנקאית</option><option value="bit">ביט</option>
        </select>
      </Field>
      <Field label="הערה"><input value={form.note} onChange={set("note")} placeholder="אופציונלי" /></Field>
      <div style={{ display: "flex", gap: 10, marginTop: 6 }}>
        <button className="btn-primary" disabled={!form.patientId || !form.amount} onClick={() => onSave({ ...form, amount: Number(form.amount) || 0 })}>שמירה</button>
        <button className="btn-secondary" onClick={onClose}>ביטול</button>
      </div>
    </Modal>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
window.__appMounted = true;

</script>
</body>
</html>
